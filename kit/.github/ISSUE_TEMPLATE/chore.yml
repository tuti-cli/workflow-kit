name: 🔧 Chore / Task
description: Refactor, tooling, dependency update, config, non-feature work
labels: ["type: chore", "status: ready"]
body:
  - type: input
    id: summary
    attributes:
      label: What needs to be done?
      placeholder: Short description
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this needed?
      placeholder: Technical debt, upgrade required, CI fix, cleanup...
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority: low"
        - "priority: medium"
        - "priority: high"
      default: 0
    validations:
      required: true
