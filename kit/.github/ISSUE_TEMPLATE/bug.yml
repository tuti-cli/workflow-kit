name: 🐛 Bug Report
description: Something is broken
labels: ["type: bug", "status: ready"]
body:
  - type: input
    id: summary
    attributes:
      label: What's broken?
      placeholder: Short, clear description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Do...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context / logs / screenshots
      placeholder: Browser, OS, env, error logs, stack traces

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority: low"
        - "priority: medium"
        - "priority: high"
        - "priority: critical"
      default: 1
    validations:
      required: true
